<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Background Circle for a clean icon look -->
  <circle cx="50" cy="50" r="48" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/>
  
  <g transform="translate(15, 23)">
    <!-- Laptop Screen -->
    <rect x="10" y="5" width="50" height="35" rx="4" fill="#334155" />
    
    <!-- Screen Display -->
    <rect x="14" y="9" width="42" height="27" rx="2" fill="#0f172a" />
    
    <!-- Code on Screen (Terminal Prompt) -->
    <polyline points="20,16 26,22 20,28" fill="none" stroke="#22c55e" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" />
    <line x1="30" y1="28" x2="42" y2="28" stroke="#22c55e" stroke-width="3" stroke-linecap="round" />
    
    <!-- Laptop Base -->
    <path d="M 4 40 L 66 40 A 3 3 0 0 1 69 43 L 69 45 A 2 2 0 0 1 67 47 L 3 47 A 2 2 0 0 1 1 45 L 1 43 A 3 3 0 0 1 4 40 Z" fill="#94a3b8" />
    
    <!-- Trackpad -->
    <rect x="30" y="42" width="10" height="3" rx="1" fill="#64748b" />
  </g>
</svg>
